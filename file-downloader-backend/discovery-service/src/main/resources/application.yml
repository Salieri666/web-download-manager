spring:
  application:
    name: discovery-service
  cloud:
    config:
      fail-fast: true
      username: ${CONFIG_SERVICE_USER:user}
      password: ${CONFIG_SERVICE_PASS:config_pass}
      retry:
        initial-interval: 5000
        max-interval: 10000
        max-attempts: 10
  config:
    import: configserver:${CONFIG_URL}
    activate:
      on-profile: dev

---

spring:
  application:
    name: discovery-service
  config:
    activate:
      on-profile: sit
    import: configserver:${CONFIG_URL}
  cloud:
    config:
      username: ${CONFIG_SERVICE_USER:user}
      password: ${CONFIG_SERVICE_PASS:config_pass}
    kubernetes:
      config:
        enabled: false