server:
  max-http-request-header-size: 64KB
  error:
    include-message: always


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

#----
spring:
  config:
    activate:
      on-profile: sit
  cloud:
    kubernetes:
      loadbalancer:
        mode: SERVICE