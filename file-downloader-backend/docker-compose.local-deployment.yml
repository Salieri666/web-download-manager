version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: filedownloader-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filedownloader}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file_downloader_network

  keycloak-file-downloader-db:
    image: postgres:17-alpine
    restart: always
    container_name: keycloak-file-downloader-db
    environment:
      POSTGRES_USER: "${KEYCLOAK_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"
      POSTGRES_DB: "${KEYCLOAK_POSTGRES_DB}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER} -d ${KEYCLOAK_POSTGRES_DB}" ]
      interval: 5s
      timeout: 2s
      retries: 25
    volumes:
      - keycloak-file-downloader-db-data:/var/lib/postgresql/data
    ports:
      - "65432:5432"
    networks:
      - file_downloader_network

  keycloak-file-downloader:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: keycloak-file-downloader
    environment:
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://keycloak-file-downloader-db:5432/${KEYCLOAK_POSTGRES_DB}"
      KC_DB_USERNAME: "${KEYCLOAK_POSTGRES_USER}"
      KC_DB_PASSWORD: "${KEYCLOAK_POSTGRES_PASSWORD}"

      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HTTP_ENABLED: "true"

      KC_HOSTNAME: "${KEYCLOAK_HOSTNAME}"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"

      KC_PROXY: "edge"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

    ports:
      - "${KEYCLOAK_HTTP_PORT}:8080"
      - "${KEYCLOAK_DEBUG_PORT}:9000"
    volumes:
      - ./init-keycloak-config/file-downloader-realm.json:/opt/keycloak/data/import/realm.json
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      keycloak-file-downloader-db:
        condition: service_healthy
    command: [
      "start",
      "--http-enabled=true",
      "--import-realm",
      "--spi-theme-static-max-age=-1",
      "--spi-theme-cache-themes=false",
      "--spi-theme-cache-templates=false"
    ]
    networks:
      - file_downloader_network

  config-service:
    build:
      context: .
      dockerfile: config-service/Dockerfile_local
    image: config-service
    container_name: config-service
    ports:
      - "${CONFIG_SERVICE_PORT}:${CONFIG_SERVICE_PORT}"
    env_file:
      - .env.local-deployment
    environment:
      CONFIG_SERVICE_PORT: "${CONFIG_SERVICE_PORT}"
      CONFIG_SERVICE_USER: "${CONFIG_SERVICE_USER}"
      CONFIG_SERVICE_PASS: "${CONFIG_SERVICE_PASS}"
    networks:
      - file_downloader_network

  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile_local
    image: discovery-service
    container_name: discovery-service
    ports:
      - "${DISCOVERY_SERVICE_PORT}:${DISCOVERY_SERVICE_PORT}"
    env_file:
      - .env.local-deployment
    depends_on:
      - config-service
    networks:
      - file_downloader_network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile_local
    image: api-gateway
    container_name: api-gateway
    ports:
      - "${GATEWAY_API_PORT}:${GATEWAY_API_PORT}"
    env_file:
      - .env.local-deployment
    environment:
      GATEWAY_API_PORT: "${GATEWAY_API_PORT}"
      KEYCLOAK_ISSUER_URI: "${KEYCLOAK_ISSUER_URI}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
    depends_on:
      - config-service
      - discovery-service
    networks:
      - file_downloader_network

  downloader-service:
    build:
      context: .
      dockerfile: downloader-service/Dockerfile_local
    image: downloader-service
    container_name: downloader-service
    ports:
      - "${DOWNLOADER_SERVICE_PORT}:${DOWNLOADER_SERVICE_PORT}"
    env_file:
      - .env.local-deployment
    environment:
      DOWNLOADER_SERVICE_PORT: "${DOWNLOADER_SERVICE_PORT}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${DB_NAME}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DOWNLOADER_SERVICE_SCHEMA: "${DOWNLOADER_SERVICE_SCHEMA}"
      GATEWAY_PUBLIC_URL: "${GATEWAY_PUBLIC_URL}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
    depends_on:
      - config-service
      - discovery-service
      - postgres
    networks:
      - file_downloader_network

volumes:
  postgres_data:
  keycloak-file-downloader-db-data:

networks:
  file_downloader_network:
    name: file_downloader_network
    driver: bridge