databaseChangeLog:
  - changeSet:
      id: 2026-05-09-01
      author: ilya
      changes:
        #==================#
        #    File table    #
        #==================#
        - createTable:
            tableName: file_description
            remarks: "File description"
            columns:
              - column:
                  constraints:
                    nullable: false
                    primaryKey: true
                  name: id
                  type: varchar(100)
                  remarks: "Primary key"
              - column:
                  name: title
                  type: text
                  constraints:
                    nullable: false
