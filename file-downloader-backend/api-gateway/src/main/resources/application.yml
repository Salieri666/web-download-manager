spring:
  application:
    name: api-gateway
  cloud:
    config:
      fail-fast: true
      username: ${CONFIG_SERVICE_USER:user}
      password: ${CONFIG_SERVICE_PASS:config_pass}
      retry:
        initial-interval: 5000
        max-interval: 10000
        max-attempts: 10
  config:
    import: configserver:${CONFIG_URL}
    activate:
      on-profile: dev

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL}
    registry-fetch-interval-seconds: 10

---

spring:
  application:
    name: api-gateway
  config:
    activate:
      on-profile: sit
    import: configserver:${CONFIG_URL}
  cloud:
    config:
      username: ${CONFIG_SERVICE_USER:user}
      password: ${CONFIG_SERVICE_PASS:config_pass}
    kubernetes:
      config:
        enabled: false
